# ============================================================
# Alembic — Configuración de migraciones
# ============================================================
# NOTA: sqlalchemy.url se IGNORA en runtime.
# env.py la sobreescribe con la URL leída de .env
# para no duplicar credenciales.
# ============================================================

[alembic]
script_location = alembic
sqlalchemy.url = mysql+pymysql://root:admin17@localhost/violette_db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s